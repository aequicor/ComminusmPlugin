# opencode-kit manifest for ComminusmPlugin

kit_version: "1.5.0"

project:
  name: "ComminusmPlugin"
  description: "Minecraft Paper server plugin — communism satire mechanics"

editors:
  - opencode

stack:
  language: kotlin
  profiles: [minecraft-paper-plugin, ollama-cloud]
  build_command: "./gradlew"
  compile_command: "./gradlew compileKotlin"
  lint_command: "./gradlew detekt ktlintCheck"
  test_command: "./gradlew :[module]:test"

modules:
  - name: plugin
    gradle_module: ":"
    source_root: "src/main/kotlin/ru/kyamshanov/comminusm/"
    test_root: "src/test/kotlin/ru/kyamshanov/comminusm/"
    docs_path: "vault/"
    responsibility: "Minecraft Paper server plugin — communism satire mechanics"

provider:
  name: ollama-cloud
  base_url: https://api.ollama.com/v1
  api_key_env: OLLAMA_CLOUD_API_KEY

models:
  default: deepseek-v4-pro:cloud
  coder: glm-5.1:cloud
  reviewer: deepseek-v4-pro:cloud
  designer: glm-5.1:cloud
  small: deepseek-v4-flash:cloud

mcp:
  context7:
    enabled: false
    api_key_env: CONTEXT7_API_KEY
  knowledge:
    enabled: true
    url: http://localhost:8010/mcp
  serena:
    enabled: true

lsp:
  enabled: true
  command: kotlin-lsp
  extensions: [".kt", ".kts"]

ui:
  framework: "Minecraft Paper"
  platforms: ["Server"]
  colors:
    - name: "Primary Background"
      hex: "#REPLACE_ME"
      purpose: "Main background color"
    - name: "Primary Accent"
      hex: "#REPLACE_ME"
      purpose: "CTA buttons, highlights"
    - name: "Primary Text"
      hex: "#FFFFFF"
      purpose: "Main text on dark background"
    - name: "Secondary Text"
      hex: "#9BA0AB"
      purpose: "Labels, hints"

code_quality:
  forbidden_patterns:
    - "!! operator (use requireNotNull/checkNotNull with message)"
    - "GlobalScope.launch (always use a scoped coroutine)"
    - "Thread.sleep in suspend code (use delay())"
    - "Empty catch blocks"
    - "Bare Exception/Throwable catch (catch specific types)"
    - "lateinit outside DI containers and tests"
    - "runBlocking outside main and tests"
    - "TODO() in production code without DECISIONS.md entry"
    - "Raw SQL string concatenation (use parameterized queries)"
    - "Logging tokens, passwords, PII data"
    - "Hardcoded Bukkit ChatColor strings — use MiniMessage or component API"
    - "Using deprecated Bukkit API (use Paper-adventure components, not legacy ChatColors)"
    - "Blocking main thread — schedule async with Bukkit schedulers or coroutines"
    - "Storing Player references past event scope (causes memory leaks)"

formatter:
  enabled: true
  name: "gradle-detekt-format"
  command: ["./gradlew", "detekt", "--auto-correct"]
  extensions: [".kt", ".kts"]
